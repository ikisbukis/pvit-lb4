<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>NeuroStep — Вхід</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .card { box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: none; }
    </style>
</head>
<body>
<div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card" style="width: 420px;">
        <div class="card-header bg-success text-white text-center py-3">
            <h3 class="mb-0">NeuroStep — Вхід</h3>
        </div>
        <div class="card-body p-4">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category=='danger' else 'success' }} mb-3">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control form-control-lg" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Пароль</label>
                    <input type="password" name="password" class="form-control form-control-lg" required>
                </div>
                <button type="submit" class="btn btn-success btn-lg w-100">Увійти</button>
            </form>

            <div class="text-center mt-4">
                Немає акаунта? <a href="/register" class="text-success">Зареєструватися</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
