<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Профіль — NeuroStep</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4>Редагування профілю</h4>
        </div>
        <div class="card-body">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Ім’я</label>
                        <input type="text" name="name" class="form-control" value="{{ profile[1] if profile else '' }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Вік</label>
                        <input type="number" name="age" class="form-control" value="{{ profile[2] if profile else '' }}">
                    </div>
                </div>
                <div class="mb-3">
                    <label>Тип травми / поранення</label>
                    <input type="text" name="injury" class="form-control" value="{{ profile[3] if profile else '' }}">
                </div>
                <div class="mb-3">
                    <label>Статус PTSD</label>
                    <select name="ptsd" class="form-select">
                        <option value="Так" {{ 'selected' if profile and profile[4]=='Так' else '' }}>Так</option>
                        <option value="Ні" {{ 'selected' if profile and profile[4]=='Ні' else '' }}>Ні</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label>Цілі реабілітації</label>
                    <textarea name="goals" class="form-control" rows="3">{{ profile[5] if profile else '' }}</textarea>
                </div>
                <button type="submit" class="btn btn-success w-100">Зберегти зміни</button>
            </form>
        </div>
        <div class="card-footer text-end">
            <a href="/dashboard" class="btn btn-secondary">Назад до дашборду</a>
        </div>
    </div>
</div>
</body>
</html>
