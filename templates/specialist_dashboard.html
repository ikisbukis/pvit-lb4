<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Дашборд спеціаліста — NeuroStep</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <div class="d-flex justify-content-between">
        <h2>Дашборд спеціаліста</h2>
        <a href="/logout" class="btn btn-outline-danger">Вийти</a>
    </div>
    <h5 class="text-muted mb-4">Пацієнти під вашим наглядом</h5>

    <table class="table table-hover table-bordered">
        <thead class="table-success">
            <tr>
                <th>ID</th>
                <th>Ім’я</th>
                <th>Вік</th>
                <th>Травма</th>
                <th>Дії</th>
            </tr>
        </thead>
        <tbody>
            {% for p in patients %}
            <tr>
                <td>{{ p[0] }}</td>
                <td>{{ p[1] }}</td>
                <td>{{ p[2] }}</td>
                <td>{{ p[3] }}</td>
                <td>
                    <a href="/assign_program/{{ p[0] }}" class="btn btn-sm btn-success">Призначити програму</a>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="5" class="text-center">Пацієнтів поки немає</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
