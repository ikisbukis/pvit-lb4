<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} — NeuroStep VR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(to bottom, #0f172a, #1e2937); color: white; }
        .task-btn { transition: all 0.3s; }
        .task-btn:disabled { opacity: 1; }
    </style>
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center mb-4">{{ title }}</h2>
    <div class="alert alert-info text-center fs-5">{{ instruction }}</div>

    <form method="POST">
        <input type="hidden" name="completed_tasks" id="completed" value="0">
        <input type="hidden" name="total_tasks" value="{{ tasks }}">

        <div class="progress mb-4" style="height: 25px;">
            <div id="progressBar" class="progress-bar progress-bar-striped bg-success" 
                 style="width: 0%; font-weight: bold;">0%</div>
        </div>

        {% for i in range(tasks) %}
        <button type="button" class="btn btn-outline-light task-btn mb-3 w-100 fs-5 py-3"
                onclick="completeTask(this, '{{ tasks }}')">
            Завдання {{ i+1 }} <span class="float-end">✓</span>
        </button>
        {% endfor %}

        <button type="submit" class="btn btn-success btn-lg w-100 mt-4 py-3">
            ✅ Завершити сесію
        </button>
    </form>

    <a href="/dashboard" class="btn btn-danger btn-lg w-100 mt-3 py-3">
        🚨 Emergency Exit
    </a>
</div>

<script>
    let completed = 0;

    function completeTask(btn, total) {
        if (btn.disabled) return;
        btn.disabled = true;
        btn.classList.remove('btn-outline-light');
        btn.classList.add('btn-success');
        completed++;

        const percent = Math.round((completed / total) * 100);
        const bar = document.getElementById('progressBar');
        bar.style.width = percent + '%';
        bar.innerText = percent + '%';
        document.getElementById('completed').value = completed;
    }
</script>
</body>
</html>
